<!DOCTYPE html>
    <html lang="ar" dir="rtl">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غماس بلدي - قائمة الطعام</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
    :root{--red:#9B1C1C;--red-dark:#7A1515;--gold:#C9A84C;--gold-light:#E8C97A;--cream:#FAF0DC;--sand-dark:#D4B878;--dark:#2C1A0E;--text:#3D2B1A;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Cairo',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;overflow-x:hidden;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(155,28,28,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(201,168,76,.12) 0%,transparent 50%);pointer-events:none;z-index:0;}
    .hero{position:relative;background:linear-gradient(160deg,#7A1515 0%,#9B1C1C 40%,#B52020 70%,#8B1515 100%);color:#fff;text-align:center;overflow:hidden;z-index:1;}
    .hero-arch{position:absolute;bottom:-2px;left:0;right:0;height:60px;background:var(--cream);clip-path:ellipse(55% 100% at 50% 100%);}
    .hero-inner{position:relative;z-index:1;padding:50px 20px 80px;}
    .logo-wrap{display:inline-block;margin-bottom:20px;filter:drop-shadow(0 8px 24px rgba(0,0,0,.4));animation:floatLogo 3s ease-in-out infinite;}
    @keyframes floatLogo{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    .logo-img{width:140px;height:140px;border-radius:50%;border:4px solid rgba(255,255,255,.3);object-fit:cover;display:block;}
    .hero-title{font-size:clamp(2rem,8vw,3.5rem);font-weight:900;letter-spacing:2px;text-shadow:0 4px 20px rgba(0,0,0,.5);margin-bottom:6px;}
    .hero-title .hl{color:var(--gold-light);}
    .hero-sub{font-size:clamp(1rem,4vw,1.3rem);font-weight:400;color:rgba(255,255,255,.85);letter-spacing:3px;margin-bottom:8px;}
    .hero-tagline{font-size:clamp(.85rem,3vw,1rem);color:rgba(255,255,255,.65);letter-spacing:1px;}
    .hero-div{display:flex;align-items:center;justify-content:center;gap:12px;margin:16px 0;color:var(--gold-light);opacity:.7;}
    .hero-div::before,.hero-div::after{content:'';height:1px;width:80px;background:var(--gold-light);opacity:.5;}
    /* branches nav */
    .bnav{position:sticky;top:0;z-index:100;background:var(--red-dark);box-shadow:0 4px 20px rgba(0,0,0,.25);}
    .binner{display:flex;justify-content:center;max-width:700px;margin:0 auto;}
    .bbtn{flex:1;padding:16px 8px;background:transparent;border:none;color:rgba(255,255,255,.65);font-family:'Cairo',sans-serif;font-size:clamp(.85rem,3vw,1.05rem);font-weight:700;cursor:pointer;transition:all .3s;position:relative;letter-spacing:.5px;}
    .bbtn::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:3px;background:var(--gold);border-radius:3px 3px 0 0;transform:scaleX(0);transition:transform .3s;}
    .bbtn.active{color:#fff;background:rgba(255,255,255,.08);}
    .bbtn.active::after{transform:scaleX(1);}
    .bicon{display:block;font-size:1.2rem;margin-bottom:2px;}
    /* content */
    .content{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:40px 16px 60px;}
    .bsec{display:none;animation:fadeIn .4s ease;}
    .bsec.active{display:block;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    /* cat nav */
    .cnav{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:40px;}
    .cbtn{padding:10px 20px;border:2px solid var(--red);background:transparent;color:var(--red);font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:700;border-radius:30px;cursor:pointer;transition:all .3s;}
    .cbtn:hover,.cbtn.active{background:var(--red);color:#fff;box-shadow:0 4px 14px rgba(155,28,28,.35);transform:translateY(-2px);}
    /* category */
    .catsec{margin-bottom:60px;}
    .catsec.hidden{display:none;}
    .catheader{display:flex;align-items:center;gap:16px;margin-bottom:30px;}
    .cattitle-wrap{background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff;padding:12px 30px 12px 40px;clip-path:polygon(0 0,calc(100% - 20px) 0,100% 50%,calc(100% - 20px) 100%,0 100%);display:inline-flex;align-items:center;gap:10px;position:relative;box-shadow:4px 4px 16px rgba(155,28,28,.3);}
    .cattitle-wrap::before{content:'';position:absolute;inset:3px;border:1.5px solid rgba(255,255,255,.2);clip-path:polygon(0 0,calc(100% - 20px) 0,100% 50%,calc(100% - 20px) 100%,0 100%);}
    .cattitle{font-size:clamp(1.2rem,4vw,1.6rem);font-weight:900;letter-spacing:1px;}
    .caticon{font-size:1.4rem;}
    .catline{flex:1;height:2px;background:linear-gradient(to left,transparent,var(--sand-dark));}
    .badge{display:inline-flex;align-items:center;gap:6px;background:rgba(155,28,28,.08);border:1px solid rgba(155,28,28,.2);color:var(--red);font-size:.8rem;font-weight:600;padding:5px 12px;border-radius:20px;margin-bottom:20px;}
    /* grid */
    .mgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px;}
    .mgrid.wide{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}
    /* card */
    .mcard{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.07);transition:all .35s cubic-bezier(.4,0,.2,1);border:1px solid rgba(201,168,76,.15);display:flex;flex-direction:column;}
    .mcard:hover{transform:translateY(-6px);box-shadow:0 12px 40px rgba(155,28,28,.15);border-color:rgba(201,168,76,.4);}
    .cimg-wrap{width:100%;aspect-ratio:1/1;overflow:hidden;background:linear-gradient(135deg,#fdf6e3,#f5e6c8);position:relative;flex-shrink:0;}
    .cimg{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;}
    .mcard:hover .cimg{transform:scale(1.06);}
    .cpbadge{position:absolute;top:8px;left:8px;background:rgba(155,28,28,.88);color:#fff;font-weight:900;font-size:.78rem;padding:3px 9px;border-radius:12px;z-index:2;}
    .cbody{padding:12px 14px 14px;display:flex;flex-direction:column;gap:6px;flex:1;}
    .cname{font-size:.92rem;font-weight:800;color:var(--dark);text-align:center;line-height:1.4;}
    .cprice{display:inline-flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff;font-weight:900;font-size:1rem;padding:5px 14px;border-radius:20px;align-self:center;box-shadow:0 3px 12px rgba(155,28,28,.3);}
    .cnote{font-size:.72rem;color:#888;text-align:center;}
    /* offer */
    .offer{background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff;border-radius:14px;padding:18px 24px;display:flex;align-items:center;gap:16px;margin-bottom:30px;box-shadow:0 6px 24px rgba(155,28,28,.3);position:relative;overflow:hidden;}
    .offer::before{content:'';position:absolute;top:-20px;left:-20px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.07);}
    .oicon{font-size:2.5rem;flex-shrink:0;}
    .otext{flex:1;z-index:1;}
    .otext strong{font-size:1.1rem;font-weight:900;display:block;margin-bottom:4px;}
    .otext span{font-size:.9rem;opacity:.85;}
    .oprice{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);color:#fff;font-weight:900;font-size:1.3rem;padding:8px 16px;border-radius:10px;flex-shrink:0;z-index:1;}
    .tax{text-align:center;color:#999;font-size:.82rem;margin-top:20px;padding-top:16px;border-top:1px solid rgba(0,0,0,.08);}
    /* divider */
    .odiv{display:flex;align-items:center;justify-content:center;gap:12px;margin:40px 0;color:var(--sand-dark);}
    .odiv::before{content:'';flex:1;height:1px;background:linear-gradient(to right,transparent,var(--sand-dark));}
    .odiv::after{content:'';flex:1;height:1px;background:linear-gradient(to left,transparent,var(--sand-dark));}
    /* footer */
    .footer{position:relative;z-index:1;background:var(--red-dark);color:#fff;text-align:center;padding:50px 20px 30px;margin-top:20px;}
    .footer::before{content:'';display:block;height:50px;background:var(--cream);clip-path:ellipse(55% 100% at 50% 0%);margin-bottom:-1px;}
    .flogo{font-size:2rem;font-weight:900;color:var(--gold-light);margin-bottom:12px;}
    .fsub{font-size:.9rem;color:rgba(255,255,255,.6);margin-bottom:28px;}
    .blist{display:flex;flex-wrap:wrap;justify-content:center;gap:20px;margin-bottom:30px;}
    .bcard{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:16px 24px;min-width:180px;}
    .bcard-name{font-size:1.05rem;font-weight:800;color:var(--gold-light);margin-bottom:4px;}
    .bcard-det{font-size:.82rem;color:rgba(255,255,255,.55);}
    .fbot{border-top:1px solid rgba(255,255,255,.1);padding-top:20px;font-size:.8rem;color:rgba(255,255,255,.4);}
    .stbtn{position:fixed;bottom:24px;left:24px;width:46px;height:46px;background:var(--red);color:#fff;border:none;border-radius:50%;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 16px rgba(155,28,28,.4);opacity:0;transform:translateY(20px);transition:all .3s;z-index:200;}
    .stbtn.vis{opacity:1;transform:translateY(0);}
    @media(max-width:480px){.mgrid{grid-template-columns:repeat(2,1fr);gap:12px;}.mgrid.wide{grid-template-columns:repeat(2,1fr);}.bbtn{padding:12px 4px;font-size:.78rem;}}
    </style>
    </head>

    function card(key, emoji, name, price, note) {
    const src = IMGS[key] || '';
    return `<div class="mcard">
      <div class="cimg-wrap">
        <span class="cpbadge">${price}</span>
        <img class="cimg" src="${src}" alt="${name}" ${src?'':'style="display:none"'}>
      </div>
      <div class="cbody">
        <div class="cname">${name}</div>
        ${note ? `<div class="cnote">${note}</div>` : ''}
        <div class="cprice">${price}</div>
      </div>
    </div>`;
    }

    const offerBanner = `<div class="offer"><div class="oicon">🎉</div><div class="otext"><strong>عرض اليوم</strong><span>وجبة كاملة مع بطاطا وبيبسي أو شنينة</span></div><div class="oprice">1.25 JD+</div></div>`;
    const divider = '<div class="odiv">✦ ✦ ✦</div>';

    const SAND = [
    card('sand_tawook','🥙','طيش طاووق','2.00 JD'),
    card('sand_laf_dajaj','🌯','لف غماس دجاج','3.25 JD'),
    card('sand_kabab_jibne','🧀','كباب دجاج بالجبنة','2.25 JD'),
    card('sand_kabab_lahm','🥩','كباب لحم','2.50 JD'),
    card('sand_batinjan','🌯','كباب بالباذنجان','2.90 JD'),
    card('sand_laf_lahm','🥗','لف غماس لحم','3.75 JD'),
    card('sand_salata','🥙','سلطة سيخين معلاق وسريع أية','5.00 JD'),
    card('sand_rosiye','🌯','روسية سيخين كباب وسريع أية','5.50 JD'),
    ].join('');

    const DISHES = [
    card('dish_nos_mishkal','🥩','نص مشكل غماس','13.00 JD','750 غرام'),
    card('dish_nos_kabab','🍢','نص كيلو كباب','11.00 JD'),
    card('dish_kilo_kabab','🍖','كيلو كباب','22.00 JD'),
    card('dish_kilo_tawook','🍗','كيلو شيش طاووق','18.00 JD'),
    card('dish_mishkal','🔥','مشكل غماس','24.00 JD','كيلو ونص'),
    card('dish_nos_tawook','🍗','نص كيلو شيش طاووق','9.00 JD'),
    card('dish_saja_lahm','🍳','صاجية لحمة','5.50 JD'),
    card('dish_saja_maalaq','🍳','صاجية معلاق','5.00 JD'),
    card('dish_qalaya','🍅','قلاية بندورة باللحمة','4.50 JD'),
    card('dish_saja_dajaj','🍳','صاجية دجاج','4.25 JD'),
    card('dish_sihi','🥗','غماس صحي','5.75 JD'),
    card('dish_hummus_lahm','🥘','حمص باللحمة','4.75 JD'),
    card('dish_hawawshi','🫓','حواوشي','2.25 JD'),
    ].join('');

    const TRAYS = [
    card('tray_kofta_tom','🍅','كفتة بيندورة','6.00 JD'),
    card('tray_kofta_tah','🫙','كفتة بطحينية','6.00 JD'),
    card('tray_zahra','🫕','صينية زهرة باللحمة المفرومة والطحينية','6.00 JD'),
    card('tray_fawaregh','🍽️','فوارغ','7.50 JD'),
    card('tray_batata','🥔','صينية بطاطا','7.00 JD'),
    card('tray_batinjan','🍆','منزلة باذنجان','6.50 JD'),
    ].join('');

    const APPS = [
    card('app_tahiniye','🫙','سلطة طحينية','2.00 JD'),
    card('app_baqdunisiye','🌿','بقدونسية','1.75 JD'),
    card('app_hummus','🫘','صحن حمص','1.25 JD'),

    card('drink_mojito_blue','🫧','موهيتو بلو أوشن','1.60 JD'),

    function catSec(id, icon, title, badge, grid, extra) {
    const w = (id==='dishes'||id==='trays') ? ' wide' : '';
    return `<div class="catsec" data-cat="${id}">
      <div class="catheader">
        <div class="cattitle-wrap"><span class="caticon">${icon}</span><span class="cattitle">${title}</span></div>
        <div class="catline"></div>
      </div>
      <div class="badge">📍 ${badge}</div>
      ${extra||''}
      <div class="mgrid${w}">${grid}</div>
    </div>`;
    }

    function catNav(branch, cats) {
    return '<div class="cnav">' +
      cats.map((c,i)=>`<button class="cbtn${i===0?' active':''}" onclick="filterCat(this,'${branch}','${c.id}')">${c.label}</button>`).join('') +
      '</div>';
    }

    document.getElementById('branch-madina').innerHTML =
    catNav('madina',[{id:'all',label:'الكل'},{id:'sandwiches',label:'السندويشات'},{id:'dishes',label:'أطباق بلدي'}]) +
    catSec('sandwiches','🥙','السندويشات','شارع المدينة المنورة',SAND,offerBanner) +
    divider +
    catSec('dishes','🍖','أطباق غماس بلدي','شارع المدينة المنورة',DISHES);

    document.getElementById('branch-tabarbour').innerHTML =
    catNav('tabarbour',[{id:'all',label:'الكل'},{id:'sandwiches',label:'السندويشات'},{id:'dishes',label:'أطباق بلدي'},{id:'trays',label:'الصواني'},{id:'appetizers',label:'المقبلات'},{id:'drinks',label:'مشروبات'}]) +
    catSec('sandwiches','🥙','السندويشات','فرع مجمع الداوود - طبربور',SAND,offerBanner) +
    divider +
    catSec('dishes','🍖','أطباق غماس بلدي','فرع مجمع الداوود - طبربور',DISHES) +
    divider +
    catSec('trays','🫕','الصواني','فرع مجمع الداوود - طبربور',TRAYS) +
    divider +
    catSec('appetizers','🥗','المقبلات','فرع مجمع الداوود - طبربور',APPS) +
    divider +
    catSec('drinks','🧃','مشروبات باردة','فرع طبربور',DRINKS) +
    '<p class="tax">* تضاف 8% ضريبة مبيعات</p>';

    document.getElementById('branch-mecca').innerHTML =
    catNav('mecca',[{id:'all',label:'الكل'},{id:'sandwiches',label:'السندويشات'},{id:'dishes',label:'أطباق بلدي'}]) +
    catSec('sandwiches','🥙','السندويشات','شارع مكة',SAND,offerBanner) +
    divider +
    catSec('dishes','🍖','أطباق غماس بلدي','شارع مكة',DISHES);

    // animate
    const obs = new IntersectionObserver(entries => entries.forEach(e => {
    if(e.isIntersecting){e.target.style.opacity='1';e.target.style.transform='translateY(0)';}
    }),{threshold:.05});
    document.querySelectorAll('.mcard').forEach((c,i)=>{
    c.style.opacity='0';c.style.transform='translateY(20px)';
    c.style.transition=`all .4s ease ${(i%8)*.06}s`;
    obs.observe(c);
    });

    function switchBranch(branch, btn) {
    document.querySelectorAll('.bbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.bsec').forEach(s=>s.classList.remove('active'));
    document.getElementById('branch-'+branch).classList.add('active');
    window.scrollTo({top:document.querySelector('.bnav').offsetTop-10,behavior:'smooth'});
    }

    function filterCat(btn, branch, cat) {
    const sec = document.getElementById('branch-'+branch);
    sec.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    sec.querySelectorAll('.catsec').forEach(s=>{
      s.classList.toggle('hidden', cat!=='all' && s.dataset.cat!==cat);
    });
    sec.querySelectorAll('.odiv').forEach(d=>{d.style.display=cat==='all'?'':'none';});
    }

    window.addEventListener('scroll',()=>{
    document.getElementById('stbtn').classList.toggle('vis', window.scrollY>300);
    });
    </script>
